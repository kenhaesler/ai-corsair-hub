name: Release (dry run)

# Manual-only trigger. Builds the installer and publishes to a throwaway draft
# release so we can verify the release pipeline (especially latest.json and
# signature generation) without burning a real version tag.
#
# Cleanup: delete the draft release and its tag manually after verification.

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'apps/gui -> target'

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Tauri CLI deps
        working-directory: apps/gui
        run: npm ci

      - name: Install frontend deps
        working-directory: apps/gui/ui
        run: npm ci

      - name: Write signing key to file
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY secret is empty or unset"
            exit 1
          fi
          mkdir -p apps/gui/.tauri
          printf '%s' "$TAURI_SIGNING_PRIVATE_KEY" > apps/gui/.tauri/signing-key.txt
          test -s apps/gui/.tauri/signing-key.txt
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Build and release (dry run)
        uses: tauri-apps/tauri-action@v0.5.22
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY_PATH: ${{ github.workspace }}/apps/gui/.tauri/signing-key.txt
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: dryrun-${{ github.run_id }}
          releaseName: 'Dry run ${{ github.run_id }}'
          releaseBody: 'Pipeline verification build. Delete after review.'
          releaseDraft: true
          prerelease: true
          projectPath: 'apps/gui'
          tauriScript: 'npx tauri'
          includeUpdaterJson: true
