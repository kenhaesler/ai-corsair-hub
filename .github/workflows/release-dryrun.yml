name: Release (dry run)

# Manual-only trigger. Builds the installer and publishes to a throwaway draft
# release so we can verify the release pipeline (especially latest.json and
# signature generation) without burning a real version tag.
#
# Cleanup: delete the draft release and its tag manually after verification.

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'apps/gui -> target'

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Tauri CLI deps
        working-directory: apps/gui
        run: npm ci

      - name: Install frontend deps
        working-directory: apps/gui/ui
        run: npm ci

      - name: Export signing key to GITHUB_ENV
        shell: bash
        # Why the dance: passing multiline secrets directly in a step's `env:` block
        # can get newlines mangled on Windows runners (root cause of commit eb04778).
        # Writing to a file first normalizes the encoding, then we re-export through
        # $GITHUB_ENV using heredoc syntax so downstream steps see a clean value.
        # The Tauri bundler reads TAURI_SIGNING_PRIVATE_KEY (not *_PATH) — see
        # "A public key has been found, but no private key" error otherwise.
        run: |
          set -euo pipefail
          if [[ -z "${PRIVATE_KEY:-}" ]]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY secret is empty or unset"
            exit 1
          fi
          mkdir -p apps/gui/.tauri
          printf '%s' "$PRIVATE_KEY" > apps/gui/.tauri/signing-key.txt
          test -s apps/gui/.tauri/signing-key.txt
          {
            echo "TAURI_SIGNING_PRIVATE_KEY<<__TAURI_KEY_EOF__"
            cat apps/gui/.tauri/signing-key.txt
            echo
            echo "__TAURI_KEY_EOF__"
          } >> "$GITHUB_ENV"
        env:
          PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Build and release (dry run)
        uses: tauri-apps/tauri-action@v0.5.22
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: dryrun-${{ github.run_id }}
          releaseName: 'Dry run ${{ github.run_id }}'
          releaseBody: 'Pipeline verification build. Delete after review.'
          releaseDraft: true
          prerelease: true
          projectPath: 'apps/gui'
          tauriScript: 'npx tauri'
          includeUpdaterJson: true
